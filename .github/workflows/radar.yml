      <tr><td>Colmenar Viejo</td><td>VPPB</td><td>282</td><td>488€/mes</td><td><a href="https://vivetuavalon.com/plan-vive/inscription/?pack=P10" target="_blank" rel="noopener">Inscríbete</a></td></tr>
      <tr><td>Getafe</td><td>VPPB</td><td>373</td><td>578€/mes</td><td><a href="https://vivetuavalon.com/plan-vive/inscription/?pack=P11" target="_blank" rel="noopener">Inscríbete</a></td></tr>
      <tr><td>Madrid (Valdebebas) — Lote 1</td><td>VPPL</td><td>441</td><td>796€/mes</td><td><a href="https://vivetuavalon.com/plan-vive/inscription/?pack=P7" target="_blank" rel="noopener">Inscríbete</a></td></tr>
      <tr><td>Alcorcón</td><td>VPPB</td><td>549</td><td>529€/mes</td><td><a href="https://vivetuavalon.com/plan-vive/inscription/?pack=P6" target="_blank" rel="noopener">Inscríbete</a></td></tr>
      <tr><td>Madrid (Valdebebas) — Lote 2</td><td>VPPL</td><td>335</td><td>903€/mes</td><td><a href="https://vivetuavalon.com/plan-vive/inscription/?pack=P1" target="_blank" rel="noopener">Inscríbete</a></td></tr>
      <tr><td>Móstoles</td><td>VPPB</td><td>430</td><td>552€/mes</td><td><a href="https://vivetuavalon.com/plan-vive/inscription/?pack=P5" target="_blank" rel="noopener">Inscríbete</a></td></tr>
      <tr><td>San Sebastián de los Reyes</td><td>VPPL</td><td>81</td><td>881€/mes</td><td><a href="https://vivetuavalon.com/plan-vive/inscription/?pack=P2" target="_blank" rel="noopener">Inscríbete</a></td></tr>
      <tr><td>Torrejón de Ardoz</td><td>VPPB</td><td>137</td><td>575€/mes</td><td><a href="https://vivetuavalon.com/plan-vive/inscription/?pack=P4" target="_blank" rel="noopener">Inscríbete</a></td></tr>
      <tr><td>Tres Cantos</td><td>VPPL</td><td>355</td><td>686€/mes</td><td><a href="https://vivetuavalon.com/plan-vive/inscription/?pack=P3" target="_blank" rel="noopener">Inscríbete</a></td></tr>
    </table>
  </div>

  <div class="inventory-group">
    <div class="inventory-source">ConVive Madrid — Lote 3 (Sogeviso)</div>
    <table class="inventory-table">
      <tr><th>Municipio</th><th>Dirección</th><th>Tipo</th><th></th></tr>
      <tr><td>San Sebastián de los Reyes</td><td>Av. Arribes del Duero, 14-16</td><td>VPPL</td><td><a href="https://www.sogeviso.com/formulario-inscripcion-plan-vive-madrid/" target="_blank" rel="noopener">Inscríbete</a></td></tr>
      <tr><td>Tres Cantos</td><td>C/ Letonia, 14</td><td>VPPL</td><td><a href="https://www.sogeviso.com/formulario-inscripcion-plan-vive-madrid/" target="_blank" rel="noopener">Inscríbete</a></td></tr>
      <tr><td>Alcorcón</td><td>C/ África, 4 / C/ Ocho de Marzo, 2-bis</td><td>VPPB</td><td><a href="https://www.sogeviso.com/formulario-inscripcion-plan-vive-madrid/" target="_blank" rel="noopener">Inscríbete</a></td></tr>
      <tr><td>Alcalá de Henares</td><td>C/ Fernando IV, 1 y 5</td><td>VPPB</td><td><a href="https://www.sogeviso.com/formulario-inscripcion-plan-vive-madrid/" target="_blank" rel="noopener">Inscríbete</a></td></tr>
      <tr><td>Getafe</td><td>C/ Juana Gutiérrez y Bella Dorotea</td><td>VPPB</td><td><a href="https://www.sogeviso.com/formulario-inscripcion-plan-vive-madrid/" target="_blank" rel="noopener">Inscríbete</a></td></tr>
    </table>
  </div>

  <div class="inventory-group">
    <div class="inventory-source">Agencia de Vivienda Social (AVS)</div>
    <table class="inventory-table">
      <tr><th>Programa</th><th>Plazo</th><th></th></tr>
      <tr><td>Situación de especial necesidad</td><td>Sin plazo, inscripción permanente</td><td><a href="https://www.comunidad.madrid/servicios/vivienda/vivienda-protegida" target="_blank" rel="noopener">Ver / Inscríbete</a></td></tr>
    </table>
  </div>

  <div class="inventory-group">
    <div class="inventory-source">Próximas aperturas (todavía cerradas, para vigilar)</div>
    <table class="inventory-table">
      <tr><th>Municipio</th><th>Apertura estimada</th></tr>
      <tr><td>Daganzo de Arriba (Plan Vive III)</td><td>Julio 2026</td></tr>
      <tr><td>Aranjuez, Villalbilla, Navalcarnero (Plan Vive III)</td><td>Septiembre 2026</td></tr>
      <tr><td>Torrelodones (Plan Vive I)</td><td>Noviembre 2026</td></tr>
    </table>
  </div>

  <h2>Fuentes monitorizadas</h2>
  <div class="sources-grid" id="sources"></div>

  <h2>Cambios detectados</h2>
  <div id="alerts"></div>

  <p class="generated" id="generated"></p>
</div>

<script>
async function load() {
  try {
    const res = await fetch('data/status.json?t=' + Date.now());
    const data = await res.json();

    document.getElementById('subtitle').textContent =
      data.sources.length + ' fuentes oficiales bajo vigilancia · comprobación cada 15 min';

    const sourcesEl = document.getElementById('sources');
    sourcesEl.innerHTML = data.sources.map(s => {
      const checked = s.last_checked
        ? new Date(s.last_checked).toLocaleString('es-ES', { dateStyle: 'short', timeStyle: 'short' })
        : 'aún no comprobada';
      return '<div class="source-card">' +
        '<div class="name"><span class="dot"></span>' + escapeHtml(s.nombre) + '</div>' +
        '<div class="meta">' + escapeHtml(s.municipio || '') + '</div>' +
        '<div class="meta">Última comprobación: ' + checked + '</div>' +
        '</div>';
    }).join('');

    const alertsEl = document.getElementById('alerts');
    if (data.alerts.length === 0) {
      alertsEl.innerHTML = '<div class="empty">No se han detectado novedades todavía. En cuanto una fuente cambie, aparecerá aquí y en Telegram.</div>';
    } else {
      alertsEl.innerHTML = data.alerts.map(a => {
        const date = new Date(a.detected_at).toLocaleString('es-ES', { dateStyle: 'medium', timeStyle: 'short' });
        return '<div class="alert-card">' +
          '<div class="alert-top">' +
            '<span class="badge ' + a.urgencia + '">' + a.urgencia + '</span>' +
            '<span class="alert-source">' + escapeHtml(a.source_name) + '</span>' +
          '</div>' +
          '<div class="alert-municipio">' + escapeHtml(a.municipio || '') + '</div>' +
          '<div class="alert-resumen">' + escapeHtml(a.resumen) + '</div>' +
          '<div class="alert-date">' + date + ' &middot; <a href="' + a.url + '" target="_blank" rel="noopener">Ver fuente</a></div>' +
          '</div>';
      }).join('');
    }

    document.getElementById('generated').textContent =
      'Última actualización del panel: ' + new Date(data.generated_at).toLocaleString('es-ES');

  } catch (e) {
    document.getElementById('subtitle').textContent = 'No se ha podido cargar el estado todavía. Espera a que corra la primera ejecución del radar (o dale a "Run workflow" en Actions).';
    document.getElementById('sources').innerHTML = '';
    document.getElementById('alerts').innerHTML = '';
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

load();
</script>
</body>
</html>
