<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Radar VPO Madrid</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #f7f6f2;
    --card: #ffffff;
    --border: #e4e2da;
    --text: #26221c;
    --text-muted: #6b6659;
    --critico-bg: #fcebeb; --critico-text: #791f1f; --critico-border: #f09595;
    --importante-bg: #faeeda; --importante-text: #633806; --importante-border: #ef9f27;
    --informativo-bg: #eaf3de; --informativo-text: #27500a; --informativo-border: #97c459;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text); padding: 24px 16px 64px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 500; margin: 0 0 4px; }
  .subtitle { color: var(--text-muted); font-size: 14px; margin: 0 0 28px; }
  h2 { font-size: 16px; font-weight: 500; margin: 32px 0 12px; }
  .sources-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
  .source-card {
    background: var(--card); border: 0.5px solid var(--border); border-radius: 12px;
    padding: 12px 14px; font-size: 13px;
  }
  .source-card .name { font-weight: 500; margin-bottom: 4px; }
  .source-card .meta { color: var(--text-muted); font-size: 12px; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; background: #97c459; }
  .alert-card {
    background: var(--card); border: 0.5px solid var(--border); border-radius: 12px;
    padding: 14px 16px; margin-bottom: 10px;
  }
  .alert-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .badge { font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: 100px; }
  .badge.CRITICO { background: var(--critico-bg); color: var(--critico-text); }
  .badge.IMPORTANTE { background: var(--importante-bg); color: var(--importante-text); }
  .badge.INFORMATIVO { background: var(--informativo-bg); color: var(--informativo-text); }
  .alert-source { font-weight: 500; font-size: 14px; }
  .alert-municipio { color: var(--text-muted); font-size: 12px; }
  .alert-resumen { font-size: 13px; color: var(--text); line-height: 1.5; margin: 6px 0; }
  .alert-date { font-size: 12px; color: var(--text-muted); }
  a { color: #185fa5; text-decoration: none; font-size: 13px; }
  a:hover { text-decoration: underline; }
  .empty { color: var(--text-muted); font-size: 14px; padding: 24px 0; text-align: center; }
  .generated { color: var(--text-muted); font-size: 12px; margin-top: 40px; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Radar VPO Madrid</h1>
  <p class="subtitle" id="subtitle">Cargando...</p>

  <h2>Fuentes monitorizadas</h2>
  <div class="sources-grid" id="sources"></div>

  <h2>Alertas detectadas</h2>
  <div id="alerts"></div>

  <p class="generated" id="generated"></p>
</div>

<script>
async function load() {
  try {
    const res = await fetch('data/status.json?t=' + Date.now());
    const data = await res.json();

    document.getElementById('subtitle').textContent =
      data.sources.length + ' fuentes oficiales bajo vigilancia · comprobación cada 15 min';

    const sourcesEl = document.getElementById('sources');
    sourcesEl.innerHTML = data.sources.map(s => {
      const checked = s.last_checked
        ? new Date(s.last_checked).toLocaleString('es-ES', { dateStyle: 'short', timeStyle: 'short' })
        : 'aún no comprobada';
      return '<div class="source-card">' +
        '<div class="name"><span class="dot"></span>' + escapeHtml(s.nombre) + '</div>' +
        '<div class="meta">' + escapeHtml(s.municipio || '') + '</div>' +
        '<div class="meta">Última comprobación: ' + checked + '</div>' +
        '</div>';
    }).join('');

    const alertsEl = document.getElementById('alerts');
    if (data.alerts.length === 0) {
      alertsEl.innerHTML = '<div class="empty">No se han detectado novedades todavía. En cuanto una fuente cambie, aparecerá aquí y en Telegram.</div>';
    } else {
      alertsEl.innerHTML = data.alerts.map(a => {
        const date = new Date(a.detected_at).toLocaleString('es-ES', { dateStyle: 'medium', timeStyle: 'short' });
        return '<div class="alert-card">' +
          '<div class="alert-top">' +
            '<span class="badge ' + a.urgencia + '">' + a.urgencia + '</span>' +
            '<span class="alert-source">' + escapeHtml(a.source_name) + '</span>' +
          '</div>' +
          '<div class="alert-municipio">' + escapeHtml(a.municipio || '') + '</div>' +
          '<div class="alert-resumen">' + escapeHtml(a.resumen) + '</div>' +
          '<div class="alert-date">' + date + ' &middot; <a href="' + a.url + '" target="_blank" rel="noopener">Ver fuente</a></div>' +
          '</div>';
      }).join('');
    }

    document.getElementById('generated').textContent =
      'Última actualización del panel: ' + new Date(data.generated_at).toLocaleString('es-ES');

  } catch (e) {
    document.getElementById('subtitle').textContent = 'No se ha podido cargar el estado todavía. Espera a que corra la primera ejecución del radar (o dale a "Run workflow" en Actions).';
    document.getElementById('sources').innerHTML = '';
    document.getElementById('alerts').innerHTML = '';
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

load();
</script>
</body>
</html>
